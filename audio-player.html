<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>聲音播放器</title>
<style>
  :root {
    --bg: #f7f4f0;
    --card: #ffffff;
    --text: #2c2416;
    --sub: #8a7e6f;
    --accent: #c45d3e;
    --accent-light: #fdf0ec;
    --green: #4a8c6f;
    --green-light: #edf7f1;
    --border: #e8e2d9;
    --shadow: 0 2px 12px rgba(44,36,22,0.06);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'Helvetica Neue', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 200px;
  }

  .header {
    background: linear-gradient(135deg, #2c2416, #4a3828);
    color: #faf8f5;
    padding: 28px 20px 22px;
    text-align: center;
  }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 12px; opacity: 0.6; margin-top: 4px; }

  .container { max-width: 480px; margin: 0 auto; padding: 16px; }

  .add-area {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    position: relative;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  .add-area:active { background: var(--accent-light); border-color: var(--accent); }
  .add-area .icon { font-size: 36px; margin-bottom: 8px; }
  .add-area h2 { font-size: 16px; font-weight: 600; }
  .add-area p { font-size: 12px; color: var(--sub); margin-top: 4px; }
  .add-area input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }

  .track-list { display: flex; flex-direction: column; gap: 8px; }

  .track {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .track:active { transform: scale(0.98); }
  .track.playing {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .track-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--sub);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .track.playing .track-num {
    background: var(--accent);
    color: white;
  }

  .track-info { flex: 1; min-width: 0; }
  .track-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-duration {
    font-size: 11px;
    color: var(--sub);
    margin-top: 2px;
  }

  .track-status {
    flex-shrink: 0;
    font-size: 20px;
  }

  .player-bar {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    box-shadow: 0 -4px 20px rgba(44,36,22,0.1);
    padding: 12px 16px 20px;
    z-index: 100;
  }
  .player-bar.active { display: block; }

  .player-now {
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 40px;
    color: var(--accent);
  }

  .progress-wrap {
    width: 100%;
    height: 6px;
    background: var(--bg);
    border-radius: 3px;
    margin-bottom: 8px;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    transition: width 0.2s linear;
  }

  .player-time {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--sub);
    margin-bottom: 14px;
  }

  .player-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    transition: all 0.15s;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:active { background: var(--bg); transform: scale(0.9); }

  .ctrl-play {
    width: 56px; height: 56px;
    background: var(--accent) !important;
    color: white !important;
    border-radius: 50%;
    font-size: 24px;
  }
  .ctrl-play:active { background: #a84a2f !important; }

  .ctrl-skip { font-size: 22px; }

  .speed-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
  }
  .speed-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    color: var(--sub);
    transition: all 0.15s;
  }
  .speed-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .loop-btn {
    font-size: 18px;
    opacity: 0.4;
  }
  .loop-btn.active { opacity: 1; color: var(--accent); }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--sub);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎵 聲音播放器</h1>
  <p>選擇影片檔案，直接聽聲音</p>
</div>

<div class="container">
  <div class="add-area" id="addArea">
    <div class="icon">📂</div>
    <h2>選擇影片檔案</h2>
    <p>支援 MP4、MOV、WebM、MP3 等格式</p>
    <input type="file" id="fileInput" accept="video/*,audio/*" multiple>
  </div>

  <div class="track-list" id="trackList"></div>
</div>

<div class="player-bar" id="playerBar">
  <div class="player-now" id="playerNow">---</div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="player-time">
    <span id="timeCurrent">0:00</span>
    <span id="timeTotal">0:00</span>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn loop-btn" id="btnLoop" onclick="toggleLoop()" title="循環">🔁</button>
    <button class="ctrl-btn ctrl-skip" onclick="skipTrack(-1)">⏮</button>
    <button class="ctrl-btn ctrl-play" id="btnPlay" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn ctrl-skip" onclick="skipTrack(1)">⏭</button>
    <button class="ctrl-btn" style="font-size:18px;opacity:0.5" onclick="clearAll()">✕</button>
  </div>
  <div class="speed-bar">
    <button class="speed-btn" onclick="setSpeed(0.75)">0.75x</button>
    <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
    <button class="speed-btn" onclick="setSpeed(1.25)">1.25x</button>
    <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
    <button class="speed-btn" onclick="setSpeed(2)">2x</button>
  </div>
</div>

<script>
let tracks = []; // { name, url, file }
let currentIndex = -1;
let isPlaying = false;
let isLooping = false;
let currentSpeed = 1;

const audio = new Audio();
audio.preload = 'metadata';

document.getElementById('fileInput').addEventListener('change', function(e) {
  const files = Array.from(e.target.files);
  if (files.length === 0) return;

  files.forEach(f => {
    if (tracks.some(t => t.name === f.name && t.file.size === f.size)) return;
    const url = URL.createObjectURL(f);
    tracks.push({ name: f.name, url, file: f });
  });

  renderTracks();
  this.value = '';
});

function renderTracks() {
  const el = document.getElementById('trackList');
  if (tracks.length === 0) {
    el.innerHTML = '';
    return;
  }

  el.innerHTML = tracks.map((t, i) => {
    const isActive = i === currentIndex;
    const displayName = t.name.replace(/\.[^.]+$/, '');
    return `
      <div class="track ${isActive ? 'playing' : ''}" onclick="playTrack(${i})">
        <div class="track-num">${isActive && isPlaying ? '♪' : (i + 1)}</div>
        <div class="track-info">
          <div class="track-name">${escHtml(displayName)}</div>
        </div>
        <div class="track-status">${isActive && isPlaying ? '🔊' : '▶'}</div>
      </div>
    `;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function playTrack(index) {
  if (index < 0 || index >= tracks.length) return;

  if (index === currentIndex && !audio.paused) {
    audio.pause();
    isPlaying = false;
    updatePlayBtn();
    renderTracks();
    return;
  }

  currentIndex = index;
  audio.src = tracks[index].url;
  audio.playbackRate = currentSpeed;
  audio.play().then(() => {
    isPlaying = true;
    updatePlayBtn();
    renderTracks();
    showPlayer();
    updateNowPlaying();
  }).catch(e => {
    console.error('Play error:', e);
  });
}

function togglePlay() {
  if (currentIndex < 0) {
    if (tracks.length > 0) playTrack(0);
    return;
  }
  if (audio.paused) {
    audio.play();
    isPlaying = true;
  } else {
    audio.pause();
    isPlaying = false;
  }
  updatePlayBtn();
  renderTracks();
}

function skipTrack(dir) {
  if (tracks.length === 0) return;
  let next = currentIndex + dir;
  if (next < 0) next = tracks.length - 1;
  if (next >= tracks.length) next = 0;
  playTrack(next);
}

function toggleLoop() {
  isLooping = !isLooping;
  audio.loop = false;
  document.getElementById('btnLoop').classList.toggle('active', isLooping);
}

function setSpeed(s) {
  currentSpeed = s;
  audio.playbackRate = s;
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === s + 'x');
  });
}

function clearAll() {
  audio.pause();
  audio.src = '';
  tracks.forEach(t => URL.revokeObjectURL(t.url));
  tracks = [];
  currentIndex = -1;
  isPlaying = false;
  renderTracks();
  document.getElementById('playerBar').classList.remove('active');
}

function updatePlayBtn() {
  document.getElementById('btnPlay').textContent = isPlaying ? '⏸' : '▶';
}

function showPlayer() {
  document.getElementById('playerBar').classList.add('active');
}

function updateNowPlaying() {
  if (currentIndex >= 0) {
    const name = tracks[currentIndex].name.replace(/\.[^.]+$/, '');
    document.getElementById('playerNow').textContent = name;
  }
}

function formatTime(sec) {
  if (isNaN(sec) || !isFinite(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ':' + s.toString().padStart(2, '0');
}

audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('timeCurrent').textContent = formatTime(audio.currentTime);
    document.getElementById('timeTotal').textContent = formatTime(audio.duration);
  }
});

audio.addEventListener('ended', () => {
  if (isLooping) {
    let next = currentIndex + 1;
    if (next >= tracks.length) next = 0;
    playTrack(next);
  } else {
    if (currentIndex < tracks.length - 1) {
      playTrack(currentIndex + 1);
    } else {
      isPlaying = false;
      updatePlayBtn();
      renderTracks();
    }
  }
});

audio.addEventListener('pause', () => {
  isPlaying = false;
  updatePlayBtn();
  renderTracks();
});

audio.addEventListener('play', () => {
  isPlaying = true;
  updatePlayBtn();
  renderTracks();
});

document.getElementById('progressWrap').addEventListener('click', function(e) {
  if (!audio.duration) return;
  const rect = this.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

let isDragging = false;
document.getElementById('progressWrap').addEventListener('touchstart', function(e) {
  isDragging = true;
  updateProgressFromTouch(e);
}, { passive: true });
document.addEventListener('touchmove', function(e) {
  if (isDragging) updateProgressFromTouch(e);
}, { passive: true });
document.addEventListener('touchend', function() {
  isDragging = false;
});

function updateProgressFromTouch(e) {
  if (!audio.duration) return;
  const bar = document.getElementById('progressWrap');
  const rect = bar.getBoundingClientRect();
  const touch = e.touches[0];
  let pct = (touch.clientX - rect.left) / rect.width;
  pct = Math.max(0, Math.min(1, pct));
  audio.currentTime = pct * audio.duration;
}
</script>

</body>
</html>
