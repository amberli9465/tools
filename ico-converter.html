<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICO 轉換工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --border: #2e2c28;
    --accent: #c9a96e;
    --accent-dim: #7a6340;
    --text: #e8e2d6;
    --text-dim: #7a7268;
    --success: #7eb89a;
    --error: #c97a6e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(201,169,110,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(126,184,154,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 560px;
    position: relative;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .title-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--accent-dim);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 0.4rem;
    font-size: 0.8rem;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* Drop zone */
  .drop-zone {
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(201,169,110,0.03) 100%);
    pointer-events: none;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent-dim);
    background: #1e1d1a;
  }

  .drop-zone.has-image {
    border-color: var(--accent-dim);
  }

  .drop-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  .drop-zone:hover .drop-icon { opacity: 0.8; }

  .drop-text {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .drop-text strong {
    color: var(--accent);
    font-weight: 400;
  }

  input[type="file"] { display: none; }

  /* Preview */
  .preview-area {
    display: none;
    align-items: center;
    gap: 1.25rem;
    padding: 0.75rem 0;
  }

  .preview-area.visible { display: flex; }

  .preview-thumb {
    width: 64px;
    height: 64px;
    object-fit: contain;
    border-radius: 4px;
    background: repeating-conic-gradient(#2a2826 0% 25%, #1a1916 0% 50%) 0 0 / 12px 12px;
    flex-shrink: 0;
  }

  .preview-info {
    flex: 1;
    min-width: 0;
  }

  .preview-name {
    font-size: 0.8rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.25rem;
  }

  .preview-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.7rem;
    padding: 0.3rem 0.7rem;
    border-radius: 2px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }

  .btn-clear:hover { border-color: var(--error); color: var(--error); }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Size selector */
  .size-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .size-item {
    position: relative;
  }

  .size-item input[type="checkbox"] {
    display: none;
  }

  .size-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.25rem;
    padding: 0.75rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    background: var(--surface);
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }

  .size-label:hover {
    border-color: var(--accent-dim);
  }

  .size-item input:checked + .size-label {
    border-color: var(--accent);
    background: rgba(201,169,110,0.08);
  }

  .size-px {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--text);
    font-weight: 400;
  }

  .size-item input:checked + .size-label .size-px {
    color: var(--accent);
  }

  .size-desc {
    font-size: 0.6rem;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.3;
  }

  .size-check {
    position: absolute;
    top: 5px;
    right: 6px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .size-item input:checked ~ .size-check { opacity: 1; }

  .select-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .btn-text {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent-dim);
    cursor: pointer;
    letter-spacing: 0.08em;
    padding: 0;
    transition: color 0.15s;
  }

  .btn-text:hover { color: var(--accent); }

  /* Convert button */
  .btn-convert {
    width: 100%;
    padding: 0.9rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 3px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .btn-convert::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.08) 100%);
    pointer-events: none;
  }

  .btn-convert:hover:not(:disabled) {
    background: #d4b47a;
  }

  .btn-convert:active:not(:disabled) {
    transform: scale(0.99);
  }

  .btn-convert:disabled {
    background: var(--border);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  /* Status */
  .status {
    margin-top: 1rem;
    padding: 0.7rem 1rem;
    border-radius: 3px;
    font-size: 0.78rem;
    display: none;
    align-items: center;
    gap: 0.6rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
  }

  .status.visible { display: flex; }
  .status.success { background: rgba(126,184,154,0.1); border: 1px solid rgba(126,184,154,0.3); color: var(--success); }
  .status.error { background: rgba(201,122,110,0.1); border: 1px solid rgba(201,122,110,0.3); color: var(--error); }
  .status.loading { background: rgba(201,169,110,0.08); border: 1px solid rgba(201,169,110,0.2); color: var(--accent); }

  /* Progress bar for loading */
  .progress-bar {
    display: none;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 0.75rem;
    overflow: hidden;
  }

  .progress-bar.visible { display: block; }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 1px;
  }

  /* Size preview strip */
  .preview-strip {
    display: none;
    gap: 0.75rem;
    align-items: flex-end;
    padding: 1rem 0 0.25rem;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .preview-strip.visible { display: flex; }
  .preview-strip::-webkit-scrollbar { display: none; }

  .strip-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35rem;
    flex-shrink: 0;
  }

  .strip-canvas {
    border-radius: 2px;
    background: repeating-conic-gradient(#2a2826 0% 25%, #1a1916 0% 50%) 0 0 / 8px 8px;
    image-rendering: pixelated;
  }

  .strip-size {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
  }

  footer {
    margin-top: 2.5rem;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="title-label">Image Converter</div>
    <h1>ICO <span>封裝</span>工具</h1>
    <p class="subtitle">將圖片打包成多尺寸 .ico 檔案，用於資料夾圖示</p>
  </header>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">🖼</div>
    <div class="drop-text">
      <strong>點擊選擇</strong>或拖曳圖片至此<br>
      支援 PNG · JPG · WebP · SVG · GIF
    </div>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <!-- Preview -->
  <div class="preview-area" id="previewArea">
    <img class="preview-thumb" id="previewThumb" src="" alt="預覽">
    <div class="preview-info">
      <div class="preview-name" id="previewName">—</div>
      <div class="preview-meta" id="previewMeta">—</div>
    </div>
    <button class="btn-clear" id="btnClear">清除</button>
  </div>

  <!-- Preview Strip -->
  <div class="preview-strip" id="previewStrip"></div>

  <div class="divider">
    <span class="divider-text">選擇輸出尺寸</span>
  </div>

  <!-- Size selector -->
  <div class="select-row">
    <button class="btn-text" id="btnAll">全選</button>
    <button class="btn-text" id="btnNone">全清</button>
    <button class="btn-text" id="btnRecommended">建議組合</button>
  </div>

  <div class="size-grid" id="sizeGrid">
    <!-- Generated by JS -->
  </div>

  <button class="btn-convert" id="btnConvert" disabled>
    產生 .ico 檔案
  </button>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="status" id="status"></div>

  <footer>本工具完全於瀏覽器本地執行 · 圖片不會上傳至任何伺服器</footer>
</div>

<script>
const SIZES = [
  { px: 16,  desc: '系統小圖示' },
  { px: 24,  desc: '工具列' },
  { px: 32,  desc: '桌面圖示' },
  { px: 48,  desc: '標準圖示' },
  { px: 64,  desc: '大圖示' },
  { px: 96,  desc: '超大圖示' },
  { px: 128, desc: 'macOS' },
  { px: 256, desc: 'HD 圖示' },
];

const RECOMMENDED = [16, 32, 48, 256];

let loadedImage = null;

// Build size grid
const grid = document.getElementById('sizeGrid');
SIZES.forEach(s => {
  const item = document.createElement('div');
  item.className = 'size-item';
  item.innerHTML = `
    <input type="checkbox" id="sz${s.px}" value="${s.px}" ${RECOMMENDED.includes(s.px) ? 'checked' : ''}>
    <label class="size-label" for="sz${s.px}">
      <span class="size-px">${s.px}</span>
      <span class="size-desc">${s.desc}</span>
    </label>
    <div class="size-check"></div>
  `;
  grid.appendChild(item);
});

// Events
document.getElementById('dropZone').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

document.getElementById('btnClear').addEventListener('click', clearImage);
document.getElementById('btnAll').addEventListener('click', () => setAll(true));
document.getElementById('btnNone').addEventListener('click', () => setAll(false));
document.getElementById('btnRecommended').addEventListener('click', () => {
  SIZES.forEach(s => {
    document.getElementById(`sz${s.px}`).checked = RECOMMENDED.includes(s.px);
  });
});
document.getElementById('btnConvert').addEventListener('click', convert);

function setAll(v) {
  SIZES.forEach(s => document.getElementById(`sz${s.px}`).checked = v);
}

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    showStatus('error', '⚠ 請選擇有效的圖片檔案');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      loadedImage = img;
      document.getElementById('previewThumb').src = e.target.result;
      document.getElementById('previewName').textContent = file.name;
      document.getElementById('previewMeta').textContent = `${img.naturalWidth} × ${img.naturalHeight} px · ${formatSize(file.size)}`;
      document.getElementById('previewArea').classList.add('visible');
      document.getElementById('dropZone').style.display = 'none';
      document.getElementById('btnConvert').disabled = false;
      hideStatus();
      renderStrip();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  loadedImage = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('previewArea').classList.remove('visible');
  document.getElementById('dropZone').style.display = '';
  document.getElementById('btnConvert').disabled = true;
  document.getElementById('previewStrip').classList.remove('visible');
  document.getElementById('previewStrip').innerHTML = '';
  hideStatus();
}

function renderStrip() {
  const strip = document.getElementById('previewStrip');
  strip.innerHTML = '';
  const checked = getCheckedSizes();
  if (!loadedImage || checked.length === 0) { strip.classList.remove('visible'); return; }

  checked.slice(0, 6).forEach(px => {
    const displayPx = Math.min(px, 48);
    const canvas = document.createElement('canvas');
    canvas.width = displayPx;
    canvas.height = displayPx;
    canvas.className = 'strip-canvas';
    canvas.style.width = displayPx + 'px';
    canvas.style.height = displayPx + 'px';
    const ctx = canvas.getContext('2d');
    ctx.drawImage(loadedImage, 0, 0, displayPx, displayPx);

    const item = document.createElement('div');
    item.className = 'strip-item';
    item.innerHTML = `<span class="strip-size">${px}px</span>`;
    item.insertBefore(canvas, item.firstChild);
    strip.appendChild(item);
  });

  strip.classList.add('visible');
}

// Re-render strip on checkbox change
grid.addEventListener('change', renderStrip);

function getCheckedSizes() {
  return SIZES.map(s => s.px).filter(px => document.getElementById(`sz${px}`).checked);
}

async function convert() {
  const sizes = getCheckedSizes();
  if (sizes.length === 0) { showStatus('error', '⚠ 請至少選擇一個尺寸'); return; }
  if (!loadedImage) return;

  showStatus('loading', '⚙ 正在產生 ICO 檔案…');
  document.getElementById('progressBar').classList.add('visible');
  document.getElementById('btnConvert').disabled = true;

  await new Promise(r => setTimeout(r, 50)); // allow UI repaint

  try {
    const frames = [];
    for (let i = 0; i < sizes.length; i++) {
      const px = sizes[i];
      const canvas = document.createElement('canvas');
      canvas.width = px; canvas.height = px;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(loadedImage, 0, 0, px, px);

      const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
      const buf = await blob.arrayBuffer();
      frames.push({ size: px, data: new Uint8Array(buf) });

      const pct = Math.round(((i + 1) / sizes.length) * 80);
      document.getElementById('progressFill').style.width = pct + '%';
    }

    const ico = buildICO(frames);
    document.getElementById('progressFill').style.width = '100%';

    await new Promise(r => setTimeout(r, 200));

    const url = URL.createObjectURL(new Blob([ico], { type: 'image/x-icon' }));
    const a = document.createElement('a');
    a.href = url;
    a.download = 'icon.ico';
    a.click();
    URL.revokeObjectURL(url);

    showStatus('success', `✓ 完成！已打包 ${sizes.length} 個尺寸：${sizes.join(', ')} px`);
  } catch (err) {
    showStatus('error', '⚠ 轉換失敗：' + err.message);
  } finally {
    document.getElementById('btnConvert').disabled = false;
    setTimeout(() => {
      document.getElementById('progressBar').classList.remove('visible');
      document.getElementById('progressFill').style.width = '0%';
    }, 600);
  }
}

function buildICO(frames) {
  const count = frames.length;
  const headerSize = 6;
  const dirEntrySize = 16;
  const dirSize = headerSize + count * dirEntrySize;

  let totalData = 0;
  frames.forEach(f => totalData += f.data.byteLength);

  const buf = new ArrayBuffer(dirSize + totalData);
  const view = new DataView(buf);

  // ICONDIR header
  view.setUint16(0, 0, true);     // reserved
  view.setUint16(2, 1, true);     // type: ICO
  view.setUint16(4, count, true); // image count

  let dataOffset = dirSize;
  frames.forEach((f, i) => {
    const base = headerSize + i * dirEntrySize;
    const sz = f.size >= 256 ? 0 : f.size; // 256 stored as 0
    view.setUint8(base, sz);       // width
    view.setUint8(base + 1, sz);   // height
    view.setUint8(base + 2, 0);    // color count
    view.setUint8(base + 3, 0);    // reserved
    view.setUint16(base + 4, 1, true);  // planes
    view.setUint16(base + 6, 32, true); // bit count
    view.setUint32(base + 8, f.data.byteLength, true);  // size
    view.setUint32(base + 12, dataOffset, true);         // offset

    // Write PNG data
    const dest = new Uint8Array(buf, dataOffset, f.data.byteLength);
    dest.set(f.data);
    dataOffset += f.data.byteLength;
  });

  return buf;
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = `status ${type} visible`;
  el.textContent = msg;
}

function hideStatus() {
  document.getElementById('status').classList.remove('visible');
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(2) + ' MB';
}
</script>
</body>
</html>
