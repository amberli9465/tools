<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amber Tools</title>
<style>
  :root{--bg:#f6f1eb;--card:#ffffff;--text:#2c2416;--sub:#7a6f60;--accent:#c45d3e;--border:#e8e2d9;--shadow:0 6px 24px rgba(44,36,22,0.08);--radius:18px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Helvetica Neue','PingFang TC','Microsoft JhengHei',sans-serif;background:linear-gradient(180deg,#f8f4ef 0%,#f3ede6 100%);color:var(--text);min-height:100vh}
  .wrap{max-width:860px;margin:0 auto;padding:28px 18px 48px}
  .hero{background:linear-gradient(135deg,#2c2416,#4a3828);color:#faf8f5;border-radius:24px;padding:32px 22px;box-shadow:var(--shadow);margin-bottom:18px}
  .hero h1{font-size:30px;font-weight:800;letter-spacing:.3px}
  .hero p{margin-top:8px;font-size:14px;opacity:.78;line-height:1.7}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);text-decoration:none;color:inherit;display:block;transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease}
  .card:hover{transform:translateY(-3px);border-color:#d8c7b6;box-shadow:0 10px 28px rgba(44,36,22,0.12)}
  .icon{font-size:30px;margin-bottom:10px}.title{font-size:20px;font-weight:700}.desc{margin-top:8px;color:var(--sub);line-height:1.7;font-size:14px}
  .tag{display:inline-block;margin-top:14px;padding:6px 10px;border-radius:999px;background:#fdf0ec;color:var(--accent);font-size:12px;font-weight:700}
  .footer{margin-top:18px;text-align:center;color:var(--sub);font-size:12px}
</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Amber Tools</h1>
      <p>姊姊的私人小工具首頁。之後新增的網頁工具，可以慢慢從這裡往下長。</p>
    </section>
    <section class="grid">
      <a class="card" href="./image-editor.html">
        <div class="icon">🖼️</div>
        <div class="title">Image Editor</div>
        <div class="desc">圖片裁切、縮放、旋轉、翻轉、浮水印與批次處理，全都直接在瀏覽器完成。</div>
        <span class="tag">圖片處理</span>
      </a>
      <a class="card" href="./audio-player.html">
        <div class="icon">🎵</div>
        <div class="title">Audio Player</div>
        <div class="desc">直接載入影片或音訊檔，播放聲音、切歌、調速與循環播放都能用。</div>
        <span class="tag">音訊工具</span>
      </a>
      <a class="card" href="./ico-converter.html">
        <div class="icon">🧩</div>
        <div class="title">ICO Converter</div>
        <div class="desc">把圖片快速封裝成多尺寸 .ico 檔案，適合資料夾圖示、捷徑圖示與桌面圖示使用。</div>
        <span class="tag">圖示工具</span>
      </a>
    </section>
    <div class="footer">Made for AmberLi</div>
  </div>
</body>
</html>
