<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>圖片調整工具</title>
<style>
  :root {
    --bg: #f5f0ea; --card: #ffffff; --text: #2c2416; --sub: #7a6f60;
    --accent: #c45d3e; --accent-light: #fdf0ec; --green: #4a8c6f;
    --green-light: #edf7f1; --border: #e8e2d9; --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: -apple-system, 'Helvetica Neue', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:40px;
  }
  .header {
    background:linear-gradient(135deg,#2c2416,#4a3828);
    color:#faf8f5; padding:24px 16px 20px; text-align:center;
  }
  .header h1 { font-size:20px; font-weight:700; }
  .header p { font-size:11px; opacity:0.6; margin-top:4px; }
  .container { max-width:520px; margin:0 auto; padding:16px; }
  .upload-area {
    background:var(--card); border:2px dashed var(--border); border-radius:var(--radius);
    padding:36px 16px; text-align:center; position:relative; cursor:pointer; margin-bottom:16px;
  }
  .upload-area .icon { font-size:36px; margin-bottom:8px; }
  .upload-area h2 { font-size:15px; font-weight:600; }
  .upload-area p { font-size:11px; color:var(--sub); margin-top:4px; }
  .upload-area input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .img-info {
    display:none; background:var(--card); border-radius:var(--radius); padding:12px 16px;
    margin-bottom:12px; box-shadow:0 2px 12px rgba(44,36,22,0.06); font-size:12px; color:var(--sub); text-align:center;
  }
  .img-info.active { display:block; }
  .img-info span { font-weight:600; color:var(--text); }
  .canvas-wrap {
    display:none; background:#e0dbd4; border-radius:var(--radius); overflow:hidden;
    margin-bottom:16px; position:relative; touch-action:none;
  }
  .canvas-wrap.active { display:block; }
  .canvas-wrap canvas { display:block; width:100%; height:auto; }
  .crop-overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:none; cursor:crosshair; }
  .crop-overlay.active { display:block; }
  .crop-box { position:absolute; border:2px solid var(--accent); background:rgba(196,93,62,0.1); pointer-events:none; }
  .crop-dim { position:absolute; background:rgba(0,0,0,0.5); pointer-events:none; }
  .section {
    display:none; background:var(--card); border-radius:var(--radius);
    margin-bottom:12px; box-shadow:0 2px 12px rgba(44,36,22,0.06); overflow:hidden;
  }
  .section.active { display:block; }
  .section-title { padding:14px 16px; font-size:14px; font-weight:600; border-bottom:1px solid var(--border); }
  .section-body { padding:14px 16px; }
  .tabs { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
  .tab {
    padding:6px 14px; border-radius:20px; border:1.5px solid var(--border); background:var(--card);
    font-size:12px; font-family:inherit; cursor:pointer; color:var(--sub);
  }
  .tab.active { background:var(--accent); color:white; border-color:var(--accent); }
  .range-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .range-row label { font-size:12px; color:var(--sub); width:60px; flex-shrink:0; }
  .range-row input[type="range"] { flex:1; accent-color:var(--accent); }
  .range-row .val { font-size:13px; font-weight:600; width:48px; text-align:right; flex-shrink:0; }
  .dim-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .dim-input {
    flex:1; padding:8px 10px; border:1.5px solid var(--border); border-radius:8px;
    font-size:13px; font-family:inherit; text-align:center; color:var(--text); background:var(--bg);
  }
  .dim-input:focus { outline:none; border-color:var(--accent); }
  .dim-x { font-size:14px; color:var(--sub); }
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:10px 20px; border-radius:8px; border:none; font-size:13px; font-weight:600;
    font-family:inherit; cursor:pointer; width:100%; margin-bottom:8px;
  }
  .btn-primary { background:var(--accent); color:white; }
  .btn-green { background:var(--green); color:white; }
  .btn-outline { background:var(--card); color:var(--text); border:1.5px solid var(--border); }
  .btn-row { display:flex; gap:8px; }
  .btn-row .btn { flex:1; }
  .format-grid { display:flex; gap:8px; margin-bottom:12px; }
  .format-opt {
    flex:1; padding:12px 8px; border-radius:10px; border:2px solid var(--border);
    background:var(--card); text-align:center; cursor:pointer;
  }
  .format-opt.active { border-color:var(--accent); background:var(--accent-light); }
  .format-opt .fi { font-size:22px; margin-bottom:4px; }
  .format-opt .fn { font-size:12px; font-weight:600; }
  .format-opt .fd { font-size:10px; color:var(--sub); }
  .result-info {
    background:var(--green-light); border-radius:8px; padding:10px 14px;
    font-size:12px; color:var(--green); margin-bottom:12px; text-align:center;
  }
  .rotate-row { display:flex; gap:8px; margin-bottom:12px; }
  .rotate-btn {
    flex:1; padding:10px; border-radius:8px; border:1.5px solid var(--border);
    background:var(--card); font-size:20px; cursor:pointer; text-align:center;
  }
  .notice { font-size:11px; color:var(--sub); text-align:center; margin-top:8px; line-height:1.6; }
</style>
</head>
<body>
<div class="header">
  <h1>🖼️ 圖片調整工具</h1>
  <p>裁切 · 縮放 · 旋轉 · 轉檔 — 全部在瀏覽器完成</p>
</div>
<div class="container">
  <div class="upload-area" id="uploadArea">
    <div class="icon">📷</div>
    <h2>點擊選擇圖片</h2>
    <p>支援 JPG、PNG、WebP、BMP、GIF</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>
  <div class="img-info" id="imgInfo"></div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
    <div class="crop-overlay" id="cropOverlay"></div>
  </div>
  <div class="section" id="cropSection">
    <div class="section-title">✂️ 裁切</div>
    <div class="section-body">
      <div class="tabs" id="ratioTabs">
        <button class="tab active" data-r="free">自由</button>
        <button class="tab" data-r="1:1">1:1</button>
        <button class="tab" data-r="4:3">4:3</button>
        <button class="tab" data-r="3:2">3:2</button>
        <button class="tab" data-r="16:9">16:9</button>
        <button class="tab" data-r="9:16">9:16</button>
        <button class="tab" data-r="2:3">2:3</button>
        <button class="tab" data-r="3:4">3:4</button>
      </div>
      <p class="notice" id="cropHint">在圖片上拖曳選取要保留的區域</p>
      <div class="dim-row" id="cropDims" style="display:none">
        <input class="dim-input" id="cropW" readonly>
        <span class="dim-x">×</span>
        <input class="dim-input" id="cropH" readonly>
        <span style="font-size:11px;color:var(--sub)">px</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnCrop">✂️ 確認裁切</button>
        <button class="btn btn-outline" id="btnResetCrop">↩ 重設</button>
      </div>
    </div>
  </div>
  <div class="section" id="resizeSection">
    <div class="section-title">📐 縮放</div>
    <div class="section-body">
      <div class="range-row">
        <label>比例</label>
        <input type="range" id="resizeRange" min="10" max="100" value="100">
        <span class="val" id="resizeVal">100%</span>
      </div>
      <div class="dim-row">
        <input class="dim-input" id="resizeW" inputmode="numeric">
        <span class="dim-x">×</span>
        <input class="dim-input" id="resizeH" inputmode="numeric">
        <span style="font-size:11px;color:var(--sub)">px</span>
      </div>
      <button class="btn btn-primary" id="btnResize">📐 套用縮放</button>
    </div>
  </div>
  <div class="section" id="rotateSection">
    <div class="section-title">🔄 旋轉 / 翻轉</div>
    <div class="section-body">
      <div class="rotate-row">
        <button class="rotate-btn" id="rotL">↺</button>
        <button class="rotate-btn" id="rotR">↻</button>
        <button class="rotate-btn" id="flipH">⇔</button>
        <button class="rotate-btn" id="flipV">⇕</button>
      </div>
    </div>
  </div>
  <div class="section" id="formatSection">
    <div class="section-title">💾 轉檔 / 下載</div>
    <div class="section-body">
      <div class="format-grid" id="formatGrid">
        <div class="format-opt active" data-f="jpeg"><div class="fi">🟧</div><div class="fn">JPG</div><div class="fd">照片通用</div></div>
        <div class="format-opt" data-f="png"><div class="fi">🟦</div><div class="fn">PNG</div><div class="fd">透明背景</div></div>
        <div class="format-opt" data-f="webp"><div class="fi">🟩</div><div class="fn">WebP</div><div class="fd">檔案最小</div></div>
      </div>
      <div class="range-row" id="qualityRow">
        <label>品質</label>
        <input type="range" id="qualityRange" min="10" max="100" value="90">
        <span class="val" id="qualityVal">90%</span>
      </div>
      <div class="result-info" id="resultInfo" style="display:none"></div>
      <button class="btn btn-green" id="btnDL">⬇️ 下載圖片</button>
    </div>
  </div>
  <div class="section" id="resetSection">
    <div class="section-body" style="text-align:center">
      <button class="btn btn-outline" id="btnReset">🔄 重新選擇圖片</button>
    </div>
  </div>
</div>

<script>
var cv = document.getElementById('mainCanvas');
var cx = cv.getContext('2d');
var ov = document.getElementById('cropOverlay');
var W = 0, H = 0, fmt = 'jpeg', qual = 0.9, ratio = 'free';
var dragging = false, sx = 0, sy = 0, ex = 0, ey = 0, box = null;

document.getElementById('fileInput').addEventListener('change', function(e) {
  var f = e.target.files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function(ev) {
    var img = new Image();
    img.onload = function() {
      W = img.width; H = img.height;
      cv.width = W; cv.height = H;
      cx.drawImage(img, 0, 0);
      document.getElementById('uploadArea').style.display = 'none';
      ['canvasWrap','cropSection','resizeSection','rotateSection','formatSection','resetSection','imgInfo'].forEach(function(id) {
        document.getElementById(id).classList.add('active');
      });
      ov.classList.add('active');
      var sz = f.size < 1048576 ? (f.size/1024).toFixed(1)+' KB' : (f.size/1048576).toFixed(1)+' MB';
      document.getElementById('imgInfo').innerHTML = '📄 <span>'+f.name+'</span> — <span>'+W+' × '+H+'</span> px — <span>'+sz+'</span>';
      updResize();
      resetCrop();
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
});

// Ratio tabs
document.getElementById('ratioTabs').addEventListener('click', function(e) {
  var b = e.target; if (!b.getAttribute('data-r')) return;
  ratio = b.getAttribute('data-r');
  var ts = this.querySelectorAll('.tab');
  for (var i=0;i<ts.length;i++) ts[i].classList.remove('active');
  b.classList.add('active');
  resetCrop();
});

// Crop
function resetCrop() { box=null; ov.innerHTML=''; document.getElementById('cropDims').style.display='none'; document.getElementById('cropHint').style.display='block'; }

function coords(e) {
  var r = ov.getBoundingClientRect();
  var t = e.touches ? e.touches[0] : e;
  return { x: Math.max(0,Math.min(W,(t.clientX-r.left)*W/r.width)), y: Math.max(0,Math.min(H,(t.clientY-r.top)*H/r.height)) };
}

ov.addEventListener('mousedown', cStart);
ov.addEventListener('touchstart', cStart, {passive:false});

function cStart(e) {
  e.preventDefault(); dragging=true;
  var c=coords(e); sx=c.x; sy=c.y; ex=c.x; ey=c.y;
  document.addEventListener('mousemove',cMove);
  document.addEventListener('mouseup',cEnd);
  document.addEventListener('touchmove',cMove,{passive:false});
  document.addEventListener('touchend',cEnd);
}
function cMove(e) {
  if(!dragging)return; e.preventDefault();
  var c=coords(e); ex=c.x; ey=c.y; drawBox();
}
function cEnd() {
  dragging=false;
  document.removeEventListener('mousemove',cMove);
  document.removeEventListener('mouseup',cEnd);
  document.removeEventListener('touchmove',cMove);
  document.removeEventListener('touchend',cEnd);
}

function drawBox() {
  var x1=Math.min(sx,ex),y1=Math.min(sy,ey),w=Math.abs(ex-sx),h=Math.abs(ey-sy);
  if(ratio!=='free'&&w>5&&h>5){
    var p=ratio.split(':'),tr=parseInt(p[0])/parseInt(p[1]);
    if(w/h>tr)w=h*tr; else h=w/tr;
    if(x1+w>W)w=W-x1; if(y1+h>H)h=H-y1;
  }
  if(w<5||h<5)return;
  box={x:Math.round(x1),y:Math.round(y1),w:Math.round(w),h:Math.round(h)};
  var r=ov.getBoundingClientRect(),mx=r.width/W,my=r.height/H;
  var bx=x1*mx,by=y1*my,bw=w*mx,bh=h*my;
  ov.innerHTML='<div class="crop-dim" style="top:0;left:0;width:100%;height:'+by+'px"></div>'+
    '<div class="crop-dim" style="top:'+(by+bh)+'px;left:0;width:100%;bottom:0"></div>'+
    '<div class="crop-dim" style="top:'+by+'px;left:0;width:'+bx+'px;height:'+bh+'px"></div>'+
    '<div class="crop-dim" style="top:'+by+'px;left:'+(bx+bw)+'px;right:0;height:'+bh+'px"></div>'+
    '<div class="crop-box" style="left:'+bx+'px;top:'+by+'px;width:'+bw+'px;height:'+bh+'px"></div>';
  document.getElementById('cropDims').style.display='flex';
  document.getElementById('cropW').value=box.w;
  document.getElementById('cropH').value=box.h;
  document.getElementById('cropHint').style.display='none';
}

document.getElementById('btnCrop').addEventListener('click',function(){
  if(!box){alert('請先在圖片上拖曳選取裁切區域');return;}
  var t=document.createElement('canvas');t.width=box.w;t.height=box.h;
  t.getContext('2d').drawImage(cv,box.x,box.y,box.w,box.h,0,0,box.w,box.h);
  W=box.w;H=box.h;cv.width=W;cv.height=H;cx.drawImage(t,0,0);
  updInfo();updResize();resetCrop();
});
document.getElementById('btnResetCrop').addEventListener('click',resetCrop);

// Resize
function updResize(){
  document.getElementById('resizeRange').value=100;
  document.getElementById('resizeVal').textContent='100%';
  document.getElementById('resizeW').value=W;
  document.getElementById('resizeH').value=H;
}
document.getElementById('resizeRange').addEventListener('input',function(){
  var p=parseInt(this.value);
  document.getElementById('resizeVal').textContent=p+'%';
  document.getElementById('resizeW').value=Math.round(W*p/100);
  document.getElementById('resizeH').value=Math.round(H*p/100);
});
document.getElementById('resizeW').addEventListener('input',function(){
  var n=parseInt(this.value)||W,r=n/W;
  document.getElementById('resizeH').value=Math.round(H*r);
  var p=Math.round(r*100);
  document.getElementById('resizeRange').value=Math.min(100,Math.max(10,p));
  document.getElementById('resizeVal').textContent=p+'%';
});
document.getElementById('resizeH').addEventListener('input',function(){
  var n=parseInt(this.value)||H,r=n/H;
  document.getElementById('resizeW').value=Math.round(W*r);
  var p=Math.round(r*100);
  document.getElementById('resizeRange').value=Math.min(100,Math.max(10,p));
  document.getElementById('resizeVal').textContent=p+'%';
});
document.getElementById('btnResize').addEventListener('click',function(){
  var nw=parseInt(document.getElementById('resizeW').value);
  var nh=parseInt(document.getElementById('resizeH').value);
  if(!nw||!nh){alert('請輸入有效尺寸');return;}
  var t=document.createElement('canvas');t.width=nw;t.height=nh;
  t.getContext('2d').drawImage(cv,0,0,W,H,0,0,nw,nh);
  W=nw;H=nh;cv.width=W;cv.height=H;cx.drawImage(t,0,0);
  updInfo();updResize();
});

// Rotate/Flip
document.getElementById('rotL').addEventListener('click',function(){rot(-90);});
document.getElementById('rotR').addEventListener('click',function(){rot(90);});
document.getElementById('flipH').addEventListener('click',function(){flip('h');});
document.getElementById('flipV').addEventListener('click',function(){flip('v');});

function rot(d){
  var t=document.createElement('canvas'),c=t.getContext('2d');
  t.width=H;t.height=W;c.translate(t.width/2,t.height/2);
  c.rotate(d*Math.PI/180);c.drawImage(cv,-W/2,-H/2);
  W=t.width;H=t.height;cv.width=W;cv.height=H;cx.drawImage(t,0,0);
  updInfo();updResize();resetCrop();
}
function flip(d){
  var t=document.createElement('canvas');t.width=W;t.height=H;var c=t.getContext('2d');
  if(d==='h'){c.translate(W,0);c.scale(-1,1);}else{c.translate(0,H);c.scale(1,-1);}
  c.drawImage(cv,0,0);cx.clearRect(0,0,W,H);cx.drawImage(t,0,0);
  updInfo();
}

// Format
document.getElementById('formatGrid').addEventListener('click',function(e){
  var o=e.target.closest('.format-opt');if(!o)return;
  fmt=o.getAttribute('data-f');
  var os=this.querySelectorAll('.format-opt');
  for(var i=0;i<os.length;i++)os[i].classList.remove('active');
  o.classList.add('active');
  document.getElementById('qualityRow').style.display=fmt==='png'?'none':'flex';
});
document.getElementById('qualityRange').addEventListener('input',function(){
  qual=parseInt(this.value)/100;
  document.getElementById('qualityVal').textContent=parseInt(this.value)+'%';
});

// Download
document.getElementById('btnDL').addEventListener('click',function(){
  if(!W)return;
  var ext=fmt==='jpeg'?'jpg':fmt;
  var url=fmt==='png'?cv.toDataURL('image/png'):cv.toDataURL('image/'+fmt,qual);
  var b=atob(url.split(',')[1]),sz=b.length;
  var ss=sz<1048576?(sz/1024).toFixed(1)+' KB':(sz/1048576).toFixed(1)+' MB';
  var ri=document.getElementById('resultInfo');ri.style.display='block';
  ri.textContent='✅ '+W+'×'+H+' px — '+ext.toUpperCase()+' — '+ss;
  var a=document.createElement('a');a.href=url;a.download='image_'+W+'x'+H+'.'+ext;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
});

// Reset
document.getElementById('btnReset').addEventListener('click',function(){
  W=0;H=0;cv.width=0;cv.height=0;
  document.getElementById('uploadArea').style.display='block';
  ['canvasWrap','cropSection','resizeSection','rotateSection','formatSection','resetSection','imgInfo'].forEach(function(id){
    document.getElementById(id).classList.remove('active');
  });
  ov.classList.remove('active');
  document.getElementById('resultInfo').style.display='none';
  document.getElementById('fileInput').value='';
  resetCrop();
});

function updInfo(){
  document.getElementById('imgInfo').innerHTML='📄 目前尺寸：<span>'+W+' × '+H+'</span> px';
}
</script>
</body>
</html>
